<!-- CONTENU -->
<section style="background:var(--dark-bg);min-height:100vh;padding:60px 0">
  <div class="container" style="max-width:600px">

    <!-- Étapes -->
    <div style="display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:48px">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary-gold),var(--secondary-gold));display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:14px">1</div>
        <span style="font-size:12px;color:var(--primary-gold);font-weight:600">Mes infos</span>
      </div>
      <div style="flex:1;height:2px;background:var(--gray-dark);margin:0 8px;margin-bottom:24px"></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--gray-dark);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--gray-medium);font-size:14px">2</div>
        <span style="font-size:12px;color:var(--gray-medium)">Paiement</span>
      </div>
      <div style="flex:1;height:2px;background:var(--gray-dark);margin:0 8px;margin-bottom:24px"></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--gray-dark);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--gray-medium);font-size:14px">3</div>
        <span style="font-size:12px;color:var(--gray-medium)">Mon compte</span>
      </div>
    </div>

    <div style="background:var(--dark-bg-card);border:1px solid rgba(212,175,55,0.2);border-radius:16px;padding:40px">
      <h1 style="font-size:26px;margin-bottom:8px">Créer mon compte</h1>
      <p style="margin-bottom:32px">Formule PROFESSIONAL — <strong style="color:var(--primary-gold)" data-price>€49</strong>/mois</p>

      <form id="inscription-form">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label for="prenom">Prénom *</label>
            <input type="text" id="prenom" name="prenom" class="form-control" placeholder="Jean" required>
          </div>
          <div class="form-group">
            <label for="nom">Nom *</label>
            <input type="text" id="nom" name="nom" class="form-control" placeholder="Dupont" required>
          </div>
        </div>

        <div class="form-group">
          <label for="raison_sociale">Raison sociale / Entreprise</label>
          <input type="text" id="raison_sociale" name="raison_sociale" class="form-control" placeholder="Mon Entreprise SAS">
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="jean@entreprise.com" required>
        </div>

        <div class="form-group">
          <label for="telephone">Téléphone *</label>
          <input type="tel" id="telephone" name="telephone" class="form-control" placeholder="+33 6 00 00 00 00" required>
        </div>

        <div class="form-group">
          <label for="adresse">Adresse *</label>
          <input type="text" id="adresse" name="adresse" class="form-control" placeholder="12 rue de la Paix" required>
        </div>

        <div style="display:grid;grid-template-columns:1fr 2fr;gap:16px">
          <div class="form-group">
            <label for="code_postal">Code postal *</label>
            <input type="text" id="code_postal" name="code_postal" class="form-control" placeholder="75001" required>
          </div>
          <div class="form-group">
            <label for="ville">Ville *</label>
            <input type="text" id="ville" name="ville" class="form-control" placeholder="Paris" required>
          </div>
        </div>

        <div class="form-group">
          <label for="pays">Pays *</label>
          <select id="pays" name="pays" class="form-control" required>
            <option value="FR">France</option>
            <option value="BE">Belgique</option>
            <option value="CH">Suisse</option>
            <option value="LU">Luxembourg</option>
            <option value="DE">Allemagne</option>
            <option value="ES">Espagne</option>
            <option value="GB">Royaume-Uni</option>
            <option value="SN">Sénégal</option>
            <option value="CI">Côte d'Ivoire</option>
            <option value="CM">Cameroun</option>
            <option value="CD">Congo RDC</option>
            <option value="ML">Mali</option>
            <option value="BF">Burkina Faso</option>
            <option value="GN">Guinée</option>
            <option value="MA">Maroc</option>
            <option value="TN">Tunisie</option>
            <option value="OTHER">Autre</option>
          </select>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label for="mot_de_passe">Mot de passe *</label>
            <input type="password" id="mot_de_passe" name="mot_de_passe" class="form-control" placeholder="8 caractères minimum" required minlength="8">
          </div>
          <div class="form-group">
            <label for="mot_de_passe_confirm">Confirmer *</label>
            <input type="password" id="mot_de_passe_confirm" class="form-control" placeholder="Répétez le mot de passe" required minlength="8">
          </div>
        </div>

        <div class="form-group" style="margin-top:8px">
          <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:13px;color:var(--gray-medium)">
            <input type="checkbox" id="cgv" required style="margin-top:3px;min-width:16px">
            <span>J'accepte les <a href="cgv.html" target="_blank" style="color:var(--primary-gold)">Conditions Générales de Vente</a> et la <a href="confidentialite.html" target="_blank" style="color:var(--primary-gold)">Politique de Confidentialité</a> *</span>
          </label>
        </div>

        <div id="form-error" class="alert alert-error" style="display:none"></div>

        <button type="submit" id="submit-btn" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px">
          Continuer vers le paiement →
        </button>

        <p style="text-align:center;font-size:12px;color:var(--gray-dark);margin-top:16px;margin-bottom:0">
          🔒 Vos données sont sécurisées · RGPD conforme
        </p>
      </form>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--gray-medium)">
      Déjà client ? <a href="dashboard.html" style="color:var(--primary-gold)">Accéder à mon compte</a>
    </p>

<script src="js/main.js"></script>
<script src="js/license-verification.js"></script>
<script>
const SUPABASE_URL = 'https://ilycnutphhmuvaonkrsa.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlseWNudXRwaGhtdXZhb25rcnNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjY5NDcsImV4cCI6MjA5MDEwMjk0N30.80ipBwMVvAkC2f0Oz2Wzl8E6GjMwlLCoE72XbePtmnM';

document.getElementById('inscription-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btn = document.getElementById('submit-btn');
  const errorDiv = document.getElementById('form-error');
  errorDiv.style.display = 'none';
  btn.innerHTML = '<span class="spinner"></span> Enregistrement...';
  btn.disabled = true;

  // Validation mot de passe
  const mdp = document.getElementById('mot_de_passe').value;
  const mdpConfirm = document.getElementById('mot_de_passe_confirm').value;
  if (mdp !== mdpConfirm) {
    errorDiv.textContent = 'Les mots de passe ne correspondent pas.';
    errorDiv.style.display = 'block';
    btn.innerHTML = 'Continuer vers le paiement →';
    btn.disabled = false;
    return;
  }

  const data = {
    prenom: document.getElementById('prenom').value.trim(),
    nom: document.getElementById('nom').value.trim(),
    raison_sociale: document.getElementById('raison_sociale').value.trim(),
    email: document.getElementById('email').value.trim(),
    telephone: document.getElementById('telephone').value.trim(),
    adresse: document.getElementById('adresse').value.trim(),
    code_postal: document.getElementById('code_postal').value.trim(),
    ville: document.getElementById('ville').value.trim(),
    pays: document.getElementById('pays').value,
    mot_de_passe: mdp,
    status: 'pending'
  };

  // Récupérer le fingerprint
  if (window.W2K_License) {
    data.fingerprint = await window.W2K_License.getFingerprint();
  }

  try {
    const resp = await fetch(SUPABASE_URL + '/rest/v1/nanoleads_clients', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': 'Bearer ' + SUPABASE_ANON,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });

    if (!resp.ok) {
      const err = await resp.json();
      if (err.code === '23505') {
        throw new Error('Cet email est déjà enregistré. <a href="dashboard.html" style="color:var(--primary-gold)">Accéder à mon compte</a>');
      }
      throw new Error('Erreur lors de l\'enregistrement. Réessayez.');
    }

    const result = await resp.json();
    const client = result[0];

    // Sauvegarder en session pour la page paiement
    sessionStorage.setItem('w2k_client', JSON.stringify(client));

    // Redirection vers paiement
    window.location.href = 'paiement.html';

  } catch(err) {
    errorDiv.innerHTML = err.message;
    errorDiv.style.display = 'block';
    btn.innerHTML = 'Continuer vers le paiement →';
    btn.disabled = false;
  }
});
</script>
</body>
